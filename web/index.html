
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Campus Safety Reporting Wireframe</title>
    </head>

    <body>
      <div id="root"></div>

      <!-- Inline OAuth callback handler: stores accessToken from query and navigates -->
      <script>
        (function() {
          try {
            var params = new URLSearchParams(window.location.search);
            var accessToken = params.get('accessToken');
            if (!accessToken) return;

            // Store token in localStorage using the app's key
            localStorage.setItem('alertme_access_token', accessToken);
            var tokenType = params.get('tokenType');
            if (tokenType) localStorage.setItem('alertme_token_type', tokenType);
            var expiresAt = params.get('expiresAt');
            if (expiresAt) localStorage.setItem('alertme_expires_at', expiresAt);

            // Redirect to current path without query params to trigger React Router loaders
            window.location.href = window.location.origin + window.location.pathname;
          } catch (e) {
            // Fail silently and let the SPA handle it
            console.error('OAuth inline handler error', e);
          }
        })();
      </script>

      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
