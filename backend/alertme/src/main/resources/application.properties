spring.config.import=optional:dotenv:
server.port=${PORT:8080}
spring.application.name=alertme

spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=postgres.rjnshudkyinfhwyrxbmh
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.oauth2.success-redirect-url=${APP_OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:5173/login}
app.oauth2.google.enabled=${APP_OAUTH2_GOOGLE_ENABLED:true}
spring.security.oauth2.client.registration.google.client-id=${APP_GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${APP_GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# Supabase Configuration
supabase.url=https://rjnshudkyinfhwyrxbmh.supabase.co
supabase.api-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.bucket=alerts

# Prevent PostgreSQL 'prepared statement already exists' error
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Disable DevTools restart to avoid classloader issues during startup
spring.devtools.restart.enabled=false

