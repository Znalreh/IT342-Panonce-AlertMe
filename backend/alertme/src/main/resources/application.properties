spring.config.import=optional:dotenv
spring.application.name=alertme
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# JWT
app.jwt.secret=${APP_JWT_SECRET:change-me}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# OAuth2 / Google Sign-In
app.oauth2.success-redirect-url=${APP_OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:5173/login}
app.oauth2.google.enabled=${APP_OAUTH2_GOOGLE_ENABLED:true}
spring.security.oauth2.client.registration.google.client-id=${APP_GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${APP_GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Supabase Configuration
supabase.url=${SUPABASE_URL:}
supabase.api-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:alerts}

# Prevent PostgreSQL 'prepared statement already exists' error
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Disable DevTools restart to avoid classloader issues during startup
spring.devtools.restart.enabled=false
